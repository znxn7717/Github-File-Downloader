name: 📝 2-Sort files

on:
  workflow_dispatch:

jobs:
  sort:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Group split zip/deb/part files into subfolders
        run: |
          cd downloads || exit 0

          for file in *; do
            if [[ -f "$file" ]]; then
              # Remove .zip, .z01..z99, .deb, .part extensions
              base="${file%.zip}"
              base="${base%.z[0-9][0-9]}"
              base="${base%.deb}"
              base="${base%.part}"
              
              if [[ "$base" != "$file" ]]; then
                echo "📁 Creating folder: $base"
                mkdir -p "$base"
                mv "$base".* "$base"/ 2>/dev/null || true
              fi
            fi
          done

      - name: Commit and push organized structure
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[AVASAM] Organize split files into folders [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin HEAD:"${{ github.ref_name }}"
            echo "✅ Sorting changes pushed"
          fi
